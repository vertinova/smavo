version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smavo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smavo_db}
      POSTGRES_USER: ${POSTGRES_USER:-smavo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smavo_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-smavo} -d ${POSTGRES_DB:-smavo_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smavo-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smavo}:${POSTGRES_PASSWORD:-smavo_password}@postgres:5432/${POSTGRES_DB:-smavo_db}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 4000
      NODE_ENV: production
    ports:
      - '4000:4000'
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN:-smavo.vertinova.id}/api
    container_name: smavo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN:-smavo.vertinova.id}/api
    ports:
      - '3001:3000'

volumes:
  pgdata:
  uploads:
